<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>개발자 변환 도구</title>
<style>
:root {
  --font-sans: "Malgun Gothic", "Apple SD Gothic Neo", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  --font-mono: Consolas, "SFMono-Regular", Menlo, Monaco, monospace;
  --text: #202426;
  --muted: #647077;
  --bg: #f5f7f8;
  --panel: #ffffff;
  --line: #d9e0e4;
  --line-strong: #b8c3ca;
  --accent: #0f766e;
  --accent-dark: #0b5f59;
  --blue: #2563eb;
  --amber: #a16207;
  --red: #b91c1c;
  --shadow: 0 12px 30px rgba(22, 34, 39, 0.08);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }
body {
  margin: 0;
  font-family: var(--font-sans);
  color: var(--text);
  background: var(--bg);
  line-height: 1.5;
}
button, input, textarea, select {
  font: inherit;
}
button {
  border: 0;
  cursor: pointer;
}
.app-header {
  position: sticky;
  top: 0;
  z-index: 10;
  padding: 0 clamp(12px, 3vw, 28px);
  border-bottom: 1px solid var(--line);
  background: rgba(255, 255, 255, 0.96);
  backdrop-filter: blur(14px);
  box-shadow: 0 10px 30px rgba(22, 34, 39, 0.06);
}
.app-header::before {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  top: 0;
  height: 3px;
  background: linear-gradient(90deg, var(--accent) 0 36%, var(--blue) 36% 68%, var(--amber) 68% 100%);
}
.header-inner {
  display: grid;
  grid-template-columns: minmax(260px, 1fr) minmax(240px, 460px) auto;
  gap: 18px;
  align-items: center;
  width: 100%;
  max-width: 1920px;
  min-height: 58px;
  margin: 0 auto;
  padding: 8px 0;
}
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}
.brand-mark {
  display: grid;
  place-items: center;
  flex: 0 0 auto;
  width: 34px;
  height: 34px;
  border: 1px solid #113f3b;
  border-radius: 8px;
  background: #102321;
  color: #ffffff;
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0;
  box-shadow: inset 0 -4px 0 rgba(15, 118, 110, 0.45);
}
.brand-text {
  min-width: 0;
}
.title-wrap h1 {
  margin: 0;
  font-size: 16px;
  line-height: 1.25;
  font-weight: 800;
}
.title-wrap p {
  margin: 1px 0 0;
  color: var(--muted);
  font-size: 11px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.brand-kicker {
  display: block;
  margin: 0;
  color: var(--accent-dark);
  font-family: var(--font-mono);
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0;
  text-transform: uppercase;
}
.search-wrap {
  position: relative;
}
.search-wrap::before {
  content: "";
  position: absolute;
  left: 12px;
  top: 50%;
  width: 12px;
  height: 12px;
  border: 2px solid var(--muted);
  border-radius: 50%;
  transform: translateY(-58%);
  pointer-events: none;
}
.search-wrap::after {
  content: "";
  position: absolute;
  left: 25px;
  top: 22px;
  width: 7px;
  height: 2px;
  border-radius: 999px;
  background: var(--muted);
  transform: rotate(45deg);
  pointer-events: none;
}
.search {
  width: 100%;
  min-height: 36px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 0 12px 0 34px;
  background: #f9fbfb;
  color: var(--text);
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.9);
}
.header-actions {
  display: flex;
  justify-content: flex-end;
}
.lang-toggle {
  display: inline-grid;
  grid-template-columns: repeat(2, 40px);
  min-height: 32px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 2px;
  background: #f7faf9;
}
.lang-btn {
  border-radius: 6px;
  background: transparent;
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
}
.lang-btn.active {
  background: var(--accent);
  color: #fff;
}
.layout {
  display: grid;
  grid-template-columns: 168px minmax(0, 1fr);
  gap: 18px;
  width: 100%;
  max-width: 1920px;
  margin: 0 auto;
  padding: 20px clamp(14px, 2vw, 34px) 38px;
}
.side {
  position: sticky;
  top: 74px;
  align-self: start;
  display: grid;
  gap: 4px;
}
.nav-btn {
  display: flex;
  align-items: center;
  justify-content: space-between;
  min-height: 34px;
  border: 1px solid transparent;
  border-radius: 8px;
  padding: 0 8px;
  background: transparent;
  color: var(--text);
  font-size: 12px;
  text-align: left;
}
.nav-btn:hover, .nav-btn.active {
  border-color: var(--line);
  background: #fff;
}
.nav-btn span:last-child {
  color: var(--muted);
  font-size: 10px;
  font-family: var(--font-mono);
}
.main {
  min-width: 0;
}
.category {
  margin-bottom: 26px;
  scroll-margin-top: 82px;
}
.quick-panel {
  margin-bottom: 18px;
}
.quick-panel.hidden {
  display: none;
}
.recent-panel h2 {
  color: var(--accent-dark);
}
.recent-panel .tool-jumps {
  border-color: var(--accent);
  background: #f2fbf9;
}
.quick-panel-head,
.category-head {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 12px;
  margin: 0 0 10px;
  padding: 0 2px;
}
.quick-panel h2,
.category h2 {
  margin: 0;
  font-size: 17px;
  line-height: 1.3;
}
.quick-panel-count,
.category-count {
  color: var(--muted);
  font-size: 12px;
  font-family: var(--font-mono);
}
.quick-panel-head-right {
  display: flex;
  align-items: center;
  gap: 10px;
}
.quick-toggle-btn {
  border: 1px solid var(--line);
  background: #fff;
  color: var(--muted);
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 6px;
  cursor: pointer;
}
.quick-toggle-btn:hover {
  border-color: var(--accent);
  color: var(--accent-dark);
}
.quick-panel.collapsed .tool-jumps {
  display: none;
}
.tool-jumps {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 0 0 14px;
  padding: 10px;
  border: 1px solid var(--line);
  border-radius: 8px;
  background: #fff;
}
.tool-jump-btn {
  min-height: 30px;
  max-width: 100%;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 0 10px;
  background: #f4f7f8;
  color: var(--text);
  font-size: 12px;
  font-weight: 700;
  text-align: left;
  overflow-wrap: anywhere;
}
.recent-tool-chip {
  display: inline-flex;
  align-items: stretch;
  max-width: 100%;
}
.recent-tool-chip .tool-jump-btn {
  border-top-right-radius: 0;
  border-bottom-right-radius: 0;
}
.recent-remove-btn {
  min-width: 30px;
  min-height: 30px;
  border: 1px solid var(--line);
  border-left: 0;
  border-radius: 0 6px 6px 0;
  background: #fff;
  color: var(--muted);
  font-size: 12px;
  font-weight: 700;
}
.recent-remove-btn:hover {
  border-color: var(--accent);
  background: #eef6f5;
  color: var(--red);
}
.tool-jump-btn:hover {
  border-color: var(--accent);
  background: #eef6f5;
  color: var(--accent-dark);
}
.tool-jump-btn.hidden {
  display: none;
}
.tools-grid {
  display: grid;
  grid-template-columns: 1fr;
  gap: 18px;
}
.tool-card {
  display: grid;
  gap: 16px;
  align-content: start;
  min-width: 0;
  scroll-margin-top: 84px;
  border: 1px solid var(--line);
  border-radius: 8px;
  padding: 18px;
  background: var(--panel);
  box-shadow: var(--shadow);
}
.tool-card.hidden, .category.hidden {
  display: none;
}
.tool-top {
  display: flex;
  align-items: start;
  justify-content: space-between;
  gap: 10px;
}
.tool-title {
  margin: 0;
  font-size: 14px;
  line-height: 1.35;
  font-weight: 700;
}
.tool-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  justify-content: flex-end;
}
.tag {
  border-radius: 999px;
  padding: 1px 7px 2px;
  background: #eef6f5;
  color: var(--accent-dark);
  font-size: 10px;
  line-height: 1.6;
}
.fields {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
}
.field {
  display: grid;
  gap: 4px;
  min-width: 0;
}
.field.wide {
  grid-column: 1 / -1;
}
.field.check {
  display: flex;
  align-items: center;
  gap: 7px;
  min-height: 34px;
}
.field label {
  color: var(--muted);
  font-size: 11px;
  font-weight: 700;
}
.field.check label {
  color: var(--text);
  font-size: 12px;
  font-weight: 500;
}
textarea, input, select {
  width: 100%;
  min-width: 0;
  border: 1px solid var(--line);
  border-radius: 6px;
  background: #fff;
  color: var(--text);
  outline: 0;
}
textarea:focus, input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(15, 118, 110, 0.13);
}
textarea {
  min-height: 124px;
  max-height: 320px;
  overflow-y: auto;
  resize: vertical;
  padding: 11px;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.5;
}
input, select {
  min-height: 38px;
  padding: 0 10px;
  font-size: 12px;
}
input[type="checkbox"] {
  width: 16px;
  height: 16px;
  min-height: 16px;
}
input[type="color"] {
  padding: 2px;
  height: 36px;
}
input[type="file"] {
  padding: 6px 8px;
}
.actions {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
}
.btn {
  min-height: 36px;
  border-radius: 6px;
  padding: 0 13px;
  background: #e9eef0;
  color: var(--text);
  font-size: 12px;
  font-weight: 700;
}
.btn.primary {
  background: var(--accent);
  color: #fff;
}
.btn.primary:hover {
  background: var(--accent-dark);
}
.btn:hover {
  filter: brightness(0.97);
}
.result-tools {
  display: grid;
  grid-template-columns: minmax(0, 1fr) auto;
  gap: 8px;
  align-items: center;
}
.result-search {
  min-height: 34px;
}
.result-match-count {
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 11px;
}
.output {
  min-height: 124px;
  max-height: none;
  overflow-y: hidden;
  background: #fbfcfc;
}
.result-highlight {
  display: none;
  max-height: 260px;
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: 6px;
  padding: 11px;
  background: #fffdf4;
  font-family: var(--font-mono);
  font-size: 12px;
  line-height: 1.5;
  white-space: pre-wrap;
  overflow-wrap: anywhere;
}
.result-highlight.on {
  display: block;
}
.preview {
  display: none;
  min-height: 34px;
  border: 1px dashed var(--line-strong);
  border-radius: 8px;
  padding: 8px;
  overflow: auto;
  background: #fbfcfc;
}
.preview.on {
  display: block;
}
.swatches {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(78px, 1fr));
  gap: 8px;
}
.swatch {
  min-height: 66px;
  border: 1px solid rgba(0,0,0,0.12);
  border-radius: 8px;
  display: grid;
  align-content: end;
  overflow: hidden;
}
.swatch span {
  display: block;
  padding: 3px 5px;
  background: rgba(255,255,255,0.88);
  color: #111;
  font-family: var(--font-mono);
  font-size: 10px;
}
.noise-meter {
  display: grid;
  gap: 10px;
}
.noise-meter-head {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.noise-meter-value {
  font-family: var(--font-mono);
  font-size: 28px;
  line-height: 1.1;
  font-weight: 700;
}
.noise-meter-sub {
  color: var(--muted);
  font-size: 12px;
}
.noise-meter-bar {
  height: 14px;
  border-radius: 999px;
  overflow: hidden;
  background: #e9eef0;
}
.noise-meter-bar span {
  display: block;
  width: 0;
  height: 100%;
  border-radius: inherit;
  background: var(--accent);
  transition: width 0.08s linear, background 0.08s linear;
}
.noise-meter-graph {
  width: 100%;
  height: 100px;
  display: block;
  border-radius: 10px;
  background: #f4f7f8;
  border: 1px solid #dde4e6;
}
.noise-meter-graph-cap {
  display: flex;
  justify-content: space-between;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 10px;
}
.noise-meter-scale {
  display: flex;
  justify-content: space-between;
  color: var(--muted);
  font-family: var(--font-mono);
  font-size: 10px;
}
.noise-meter-note {
  margin: 0;
  color: var(--muted);
  font-size: 11px;
}
.mini-table {
  width: 100%;
  border-collapse: collapse;
  font-size: 12px;
}
.mini-table th, .mini-table td {
  border-bottom: 1px solid var(--line);
  padding: 5px 6px;
  text-align: left;
  vertical-align: top;
}
.mini-table th {
  color: var(--muted);
  font-size: 11px;
}
.diff-table td:first-child {
  width: 38px;
  font-family: var(--font-mono);
  text-align: center;
}
.diff-add td {
  background: #ecfdf5;
}
.diff-del td {
  background: #fef2f2;
}
.diff-same td {
  background: #fbfcfc;
}
.match {
  border-radius: 3px;
  background: #fff3bf;
  color: #312700;
}
.toast {
  position: fixed;
  right: 16px;
  bottom: 72px;
  z-index: 20;
  max-width: min(420px, calc(100vw - 32px));
  border-radius: 8px;
  padding: 10px 12px;
  background: #1f2933;
  color: #fff;
  font-size: 12px;
  box-shadow: 0 14px 34px rgba(0,0,0,0.22);
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
  transition: opacity 0.18s ease, transform 0.18s ease;
}
.toast.on {
  opacity: 1;
  transform: translateY(0);
}
.toast.error {
  background: var(--red);
}
.top-btn {
  position: fixed;
  right: 16px;
  bottom: 16px;
  z-index: 19;
  display: grid;
  place-items: center;
  width: 44px;
  height: 44px;
  border: 1px solid var(--line-strong);
  border-radius: 8px;
  background: #ffffff;
  color: var(--accent-dark);
  box-shadow: 0 12px 28px rgba(22, 34, 39, 0.16);
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
  transition: opacity 0.18s ease, transform 0.18s ease, background 0.18s ease;
}
.top-btn.on {
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}
.top-btn:hover {
  background: #eef6f5;
}
.top-btn svg {
  width: 22px;
  height: 22px;
  stroke: currentColor;
}
.muted {
  color: var(--muted);
}
@media (max-width: 1120px) {
  .header-inner {
    grid-template-columns: minmax(230px, 1fr) minmax(220px, 380px) auto;
  }
  .tools-grid {
    gap: 14px;
  }
  .tool-card {
    padding: 14px;
  }
}
@media (max-width: 760px) {
  .app-header {
    position: static;
    padding: 0 14px;
  }
  .header-inner {
    grid-template-columns: 1fr;
    gap: 10px;
    min-height: 0;
    padding: 10px 0;
  }
  .brand {
    align-items: flex-start;
  }
  .brand-mark {
    width: 34px;
    height: 34px;
  }
  .title-wrap p {
    white-space: normal;
  }
  .header-actions {
    justify-content: flex-start;
  }
  .layout {
    grid-template-columns: 1fr;
    padding-top: 12px;
  }
  .side {
    position: static;
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .fields {
    grid-template-columns: 1fr;
  }
  .category {
    scroll-margin-top: 12px;
  }
}
</style>
</head>
<body>
<header class="app-header">
  <div class="header-inner">
    <div class="brand">
      <div class="brand-mark" aria-hidden="true">DC</div>
      <div class="title-wrap brand-text">
        <span class="brand-kicker">Dev Conv</span>
        <h1>개발자 변환</h1>
        <p>인코딩, 날짜, 해시, 텍스트, 네트워크, 색상, 코드 도구</p>
      </div>
    </div>
    <div class="search-wrap">
      <input id="toolSearch" class="search" type="search" placeholder="도구 검색">
    </div>
    <div class="header-actions">
      <div id="languageToggle" class="lang-toggle" role="group" aria-label="언어 선택">
        <button id="langKo" class="lang-btn" type="button" data-lang="ko">KO</button>
        <button id="langEn" class="lang-btn" type="button" data-lang="en">EN</button>
      </div>
    </div>
  </div>
</header>
<div class="layout">
  <nav id="sideNav" class="side" aria-label="도구 카테고리"></nav>
  <main id="main" class="main"></main>
</div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<button id="topButton" class="top-btn" type="button" aria-label="맨 위로 이동">
  <svg viewBox="0 0 24 24" fill="none" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
    <path d="M12 19V5"></path>
    <path d="M5 12l7-7 7 7"></path>
  </svg>
</button>

<script>
"use strict";

const categories = [
  ["encoding", "인코딩 / 디코딩"],
  ["datetime", "날짜 / 시간"],
  ["crypto", "해시 / 암호화"],
  ["text", "텍스트 변환"],
  ["number", "숫자 / 진수"],
  ["network", "네트워크 / 웹"],
  ["color", "색상"],
  ["code", "코드 관련"]
];
const ALL_CATEGORY = "all";
const LANG_STORAGE_KEY = "devconv.lang";
const RECENT_STORAGE_KEY = "devconv.recent";
const QUICK_COLLAPSE_STORAGE_KEY = "devconv.quickCollapsed";
const MAX_RECENT = 8;
const SUPPORTED_LANGS = new Set(["ko", "en"]);

const I18N = {
  ko: {
    documentTitle: "개발자 변환 도구",
    appTitle: "개발자 변환",
    appSubtitle: "인코딩, 날짜, 해시, 텍스트, 네트워크, 색상, 코드 도구",
    searchPlaceholder: "도구 검색",
    navAria: "도구 카테고리",
    topAria: "맨 위로 이동",
    languageAria: "언어 선택",
    koLabel: "한국어",
    enLabel: "영어",
    allTools: "모든 도구",
    quickPanelTitle: "도구 퀵 버튼",
    quickPanelAria: "도구 퀵 버튼",
    quickPanelCollapse: "접기",
    quickPanelExpand: "펼치기",
    recentPanelTitle: "최근 사용한 도구",
    recentPanelAria: "최근 사용한 도구 퀵 버튼",
    recentRemoveAria: "최근 사용한 도구에서 제거",
    run: "실행",
    copy: "결과 복사",
    clear: "초기화",
    stop: "정지",
    remeasure: "재측정",
    resultPlaceholder: "결과",
    resultSearchPlaceholder: "결과 검색",
    resultSearchAria: "결과 텍스트 검색",
    noCopyResult: "복사할 결과가 없습니다.",
    copiedResult: "결과를 복사했습니다.",
    processing: "처리 중...",
    genericError: "오류가 발생했습니다.",
    languageChanged: "언어를 한국어로 전환했습니다."
  },
  en: {

function area(name, label, placeholder) { return { type: "textarea", name, label, placeholder: placeholder || "", wide: true }; }
function input(name, label, placeholder) { return { type: "input", name, label, placeholder: placeholder || "" }; }
function select(name, label, options, value) { return { type: "select", name, label, options, value }; }
function checkbox(name, label, checked) { return { type: "checkbox", name, label, checked: !!checked }; }
function file(name, label) { return { type: "file", name, label, wide: true }; }

let quickCollapsed = loadQuickCollapsed();

function loadQuickCollapsed() {
  try {
    return localStorage.getItem(QUICK_COLLAPSE_STORAGE_KEY) === "1";
  } catch (_) {
    return false;
  }
}

function setQuickCollapsed(collapsed) {
  quickCollapsed = collapsed;
  try {
    localStorage.setItem(QUICK_COLLAPSE_STORAGE_KEY, collapsed ? "1" : "0");
  } catch (_) {
    // Collapse state still works in-memory without persisted storage.
  }
  applyQuickCollapsed();
}

function applyQuickCollapsed() {
  const panel = document.getElementById("toolQuickPanel");
  const toggle = document.getElementById("quickToggle");
  if (!panel) return;
  panel.classList.toggle("collapsed", quickCollapsed);
  if (toggle) {
    toggle.textContent = uiText(quickCollapsed ? "quickPanelExpand" : "quickPanelCollapse");
    toggle.setAttribute("aria-expanded", quickCollapsed ? "false" : "true");
  }
}

function loadRecentTools() {
  try {
    const raw = JSON.parse(localStorage.getItem(RECENT_STORAGE_KEY) || "[]");
    if (!Array.isArray(raw)) return [];
    const valid = new Set(tools.map(t => t.id));
    return raw.filter(id => valid.has(id)).slice(0, MAX_RECENT);
  } catch (_) {
    return [];
  }
}

function recordRecentTool(id) {
  if (!id) return;
  recentToolIds = [id, ...recentToolIds.filter(x => x !== id)].slice(0, MAX_RECENT);
  try {
    localStorage.setItem(RECENT_STORAGE_KEY, JSON.stringify(recentToolIds));
  } catch (_) {
    // Recent list still works in-memory without persisted storage.
  }
  renderRecentPanel();
}

function removeRecentTool(id) {
  recentToolIds = recentToolIds.filter(x => x !== id);
  try {
    localStorage.setItem(RECENT_STORAGE_KEY, JSON.stringify(recentToolIds));
  } catch (_) {
    // Recent list still works in-memory without persisted storage.
  }
  renderRecentPanel();
}

function renderRecentPanel() {
  const panel = document.getElementById("recentPanel");
  const buttons = document.getElementById("recentButtons");
  if (!panel || !buttons) return;
  const recentTools = recentToolIds
    .map(id => tools.find(t => t.id === id))
    .filter(Boolean);
  panel.classList.toggle("hidden", recentTools.length === 0);
  buttons.innerHTML = recentTools.map(recentButtonHtml).join("");
}

function recentButtonHtml(tool) {
  const id = escapeHtml(tool.id);
  const title = escapeHtml(localText(tool.title));
  return `<span class="recent-tool-chip"><button class="tool-jump-btn" data-recent="${id}">${title}</button><button class="recent-remove-btn" type="button" data-recent-remove="${id}" aria-label="${escapeHtml(uiText("recentRemoveAria"))}: ${title}" title="${escapeHtml(uiText("recentRemoveAria"))}">x</button></span>`;
}

function escapeHtml(value) {
  return String(value).replace(/[&<>"']/g, ch => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[ch]));
}

function initLanguage() {
  try {
    const saved = localStorage.getItem(LANG_STORAGE_KEY);
    if (SUPPORTED_LANGS.has(saved)) return saved;
  } catch (_) {
    // Ignore storage failures in private or restricted browser contexts.
  }
  return "ko";
}

function uiText(key) {
  return (I18N[currentLang] && I18N[currentLang][key]) || I18N.ko[key] || key;
}

function localText(value) {
  const text = String(value ?? "");
  return currentLang === "en" ? EN_LABELS[text] || text : text;
}

function langText(ko, en) {
  return currentLang === "en" ? en : ko;
}

function searchTextVariant(value) {
  const text = String(value ?? "");
  const en = EN_LABELS[text];
  return en && en !== text ? `${text} ${en}` : text;
}

function toolSearchText(tool) {
  const parts = [tool.title, ...tool.tags];
  for (const field of tool.fields) {
    parts.push(field.label, field.placeholder);
    if (field.options) {
      for (const [label] of field.options) parts.push(label);
    }
  }
  return parts.map(searchTextVariant).join(" ").toLowerCase();
}

function formatToolCount(count) {
  if (currentLang === "en") return `${count} ${count === 1 ? "tool" : "tools"}`;
  return `${count}개 도구`;
}

function formatSearchResultCount(count) {
  if (currentLang === "en") return `${count} ${count === 1 ? "search result" : "search results"}`;
  return `${count}개 검색 결과`;
}

function applyLanguageText() {
  document.documentElement.lang = currentLang;
  document.title = uiText("documentTitle");
  const title = document.querySelector(".title-wrap h1");
  const subtitle = document.querySelector(".title-wrap p");
  const search = document.getElementById("toolSearch");
  const nav = document.getElementById("sideNav");
  const topButton = document.getElementById("topButton");
  const langGroup = document.getElementById("languageToggle");

  if (title) title.textContent = uiText("appTitle");
  if (subtitle) subtitle.textContent = uiText("appSubtitle");
  if (search) search.placeholder = uiText("searchPlaceholder");
  if (nav) nav.setAttribute("aria-label", uiText("navAria"));
  if (topButton) topButton.setAttribute("aria-label", uiText("topAria"));
  if (langGroup) langGroup.setAttribute("aria-label", uiText("languageAria"));

  document.querySelectorAll(".lang-btn").forEach(button => {
    const active = button.dataset.lang === currentLang;
    button.classList.toggle("active", active);
    button.setAttribute("aria-pressed", String(active));
    button.setAttribute("aria-label", button.dataset.lang === "ko" ? uiText("koLabel") : uiText("enLabel"));
    button.title = button.getAttribute("aria-label");
  });
}

function setLanguage(lang) {
  if (!SUPPORTED_LANGS.has(lang) || lang === currentLang) return;
  stopAllNoiseMeters(false);
  const state = captureToolState();
  currentLang = lang;
  try {
    localStorage.setItem(LANG_STORAGE_KEY, currentLang);
  } catch (_) {
    // Language switching still works without persisted storage.
  }
  render(state);
  showToast(uiText("languageChanged"));
}

function captureToolState() {
  const state = {};
  document.querySelectorAll(".tool-card").forEach(card => {
    const values = {};
    card.querySelectorAll("[data-field]").forEach(el => {
      if (el.type === "file") return;
      values[el.dataset.field] = el.type === "checkbox" ? el.checked : el.value;
    });
    state[card.dataset.tool] = {
      values,
      output: card.querySelector(".output")?.value || "",
      resultQuery: card.querySelector(".result-search")?.value || "",
      preview: card.querySelector(".preview")?.innerHTML || ""
    };
  });
  return state;
}

function restoreToolState(state) {
  if (!state) return;
  document.querySelectorAll(".tool-card").forEach(card => {
    const item = state[card.dataset.tool];
    if (!item) return;
    card.querySelectorAll("[data-field]").forEach(el => {
      if (!(el.dataset.field in item.values) || el.type === "file") return;
      if (el.type === "checkbox") el.checked = !!item.values[el.dataset.field];
      else el.value = item.values[el.dataset.field];
      if (el.tagName === "TEXTAREA") autoResizeTextarea(el, INPUT_TEXTAREA_MAX_HEIGHT);
    });
    const output = card.querySelector(".output");
    const preview = card.querySelector(".preview");
    if (output) {
      output.value = item.output || "";
      autoResizeTextarea(output);
    }
    const resultSearch = card.querySelector(".result-search");
    if (resultSearch) resultSearch.value = item.resultQuery || "";
    updateResultHighlight(card);
    if (preview) {
      preview.innerHTML = item.preview || "";
      preview.classList.toggle("on", !!item.preview);
    }
  });
}

function render(state) {
  applyLanguageText();
  const nav = document.getElementById("sideNav");
  const main = document.getElementById("main");
  const counts = new Map(categories.map(([id]) => [id, tools.filter(t => t.category === id).length]));
  const navItems = [[ALL_CATEGORY, uiText("allTools")], ...categories.map(([id, name]) => [id, localText(name)])];
  counts.set(ALL_CATEGORY, tools.length);
  nav.innerHTML = navItems.map(([id, name]) => `<button class="nav-btn" data-target="${id}"><span>${escapeHtml(name)}</span><span>${counts.get(id)}</span></button>`).join("");
  main.innerHTML = `<section id="recentPanel" class="quick-panel recent-panel hidden">
    <div class="quick-panel-head"><h2>${escapeHtml(uiText("recentPanelTitle"))}</h2></div>
    <div id="recentButtons" class="tool-jumps" aria-label="${escapeHtml(uiText("recentPanelAria"))}"></div>
  </section>
  <section id="toolQuickPanel" class="quick-panel">
    <div class="quick-panel-head"><h2>${escapeHtml(uiText("quickPanelTitle"))}</h2><div class="quick-panel-head-right"><span id="toolQuickCount" class="quick-panel-count"></span><button type="button" id="quickToggle" class="quick-toggle-btn" data-quick-toggle aria-expanded="true"></button></div></div>
    <div id="toolQuickButtons" class="tool-jumps" aria-label="${escapeHtml(uiText("quickPanelAria"))}"></div>
  </section>` + categories.map(([id, name]) => {
    const categoryTools = tools.filter(t => t.category === id);
    const cards = categoryTools.map(toolHtml).join("");
    return `<section id="${id}" class="category" data-category="${id}">
      <div class="category-head"><h2>${escapeHtml(localText(name))}</h2><span class="category-count">${formatToolCount(counts.get(id))}</span></div>
      <div class="tools-grid">${cards}</div>
    </section>`;
  }).join("");

  bindEvents();
  restoreToolState(state);
  setActiveCategory(activeCategory, false);
  renderRecentPanel();
}

function bindEvents() {
  if (eventsBound) return;
  document.getElementById("sideNav").addEventListener("click", onNavClick);
  document.getElementById("main").addEventListener("click", onMainClick);
  document.getElementById("main").addEventListener("input", onMainInput);
  document.getElementById("main").addEventListener("change", onMainChange);
  document.getElementById("toolSearch").addEventListener("input", filterTools);
  document.querySelectorAll(".lang-btn").forEach(button => {
    button.addEventListener("click", () => setLanguage(button.dataset.lang));
  });
  window.addEventListener("beforeunload", () => stopAllNoiseMeters(false));
  setupTopButton();
  eventsBound = true;
}

function toolHtml(tool) {
  return `<article class="tool-card" data-tool="${tool.id}" data-search="${escapeHtml(toolSearchText(tool))}">
    <div class="tool-top">
      <h3 class="tool-title">${escapeHtml(localText(tool.title))}</h3>
      <div class="tool-tags">${tool.tags.map(tag => `<span class="tag">${escapeHtml(localText(tag))}</span>`).join("")}</div>
    </div>
    <div class="fields">${tool.fields.map(fieldHtml).join("")}</div>
    <div class="actions">
      <button class="btn primary" data-action="run">${escapeHtml(uiText("run"))}</button>
      <button class="btn" data-action="copy">${escapeHtml(uiText("copy"))}</button>
      <button class="btn" data-action="clear">${escapeHtml(uiText("clear"))}</button>
    </div>
    <div class="result-tools">
      <input class="result-search" type="search" placeholder="${escapeHtml(uiText("resultSearchPlaceholder"))}" aria-label="${escapeHtml(uiText("resultSearchAria"))}">
      <span class="result-match-count" aria-live="polite"></span>
    </div>
    <textarea class="output" readonly placeholder="${escapeHtml(uiText("resultPlaceholder"))}"></textarea>
    <div class="result-highlight" aria-live="polite"></div>
    <div class="preview" aria-live="polite"></div>
  </article>`;
}

function toolQuickButtonHtml(tool) {
  return `<button class="tool-jump-btn" data-jump="${escapeHtml(tool.id)}" data-search="${escapeHtml(toolSearchText(tool))}">${escapeHtml(localText(tool.title))}</button>`;
}

function fieldHtml(f) {
  const wide = f.wide || f.type === "textarea" ? " wide" : "";
  const label = localText(f.label);
  const placeholder = localText(f.placeholder);
  if (f.type === "textarea") {
    return `<div class="field${wide}"><label>${escapeHtml(label)}</label><textarea data-field="${f.name}" placeholder="${escapeHtml(placeholder)}">${escapeHtml(placeholder || "")}</textarea></div>`;
  }
  if (f.type === "select") {
    return `<div class="field${wide}"><label>${escapeHtml(label)}</label><select data-field="${f.name}">${f.options.map(([optionLabel, value]) => `<option value="${escapeHtml(value)}"${value === f.value ? " selected" : ""}>${escapeHtml(localText(optionLabel))}</option>`).join("")}</select></div>`;
  }
  if (f.type === "checkbox") {
    return `<div class="field check"><input type="checkbox" data-field="${f.name}"${f.checked ? " checked" : ""}><label>${escapeHtml(label)}</label></div>`;
  }
  if (f.type === "file") {
    return `<div class="field${wide}"><label>${escapeHtml(label)}</label><input type="file" data-field="${f.name}"></div>`;
  }
  return `<div class="field${wide}"><label>${escapeHtml(label)}</label><input data-field="${f.name}" placeholder="${escapeHtml(placeholder)}" value="${escapeHtml(placeholder || "")}"></div>`;
}

async function onMainClick(e) {
  const recentRemoveButton = e.target.closest("button[data-recent-remove]");
  if (recentRemoveButton) {
    removeRecentTool(recentRemoveButton.dataset.recentRemove);
    return;
  }
  const recentButton = e.target.closest("button[data-recent]");
  if (recentButton) {
    showSingleTool(recentButton.dataset.recent);
    return;
  }
  const quickToggle = e.target.closest("button[data-quick-toggle]");
  if (quickToggle) {
    setQuickCollapsed(!quickCollapsed);
    return;
  }
  const jumpButton = e.target.closest("button[data-jump]");
  if (jumpButton) {
    showSingleTool(jumpButton.dataset.jump, { keepCategory: true });
    return;
  }
  const button = e.target.closest("button[data-action]");
  if (!button) return;
  const card = button.closest(".tool-card");
  const action = button.dataset.action;
  if (action === "run") {
    await runTool(card);
  } else if (action === "noiseStop") {
    stopNoiseMeter(card, true);
  } else if (action === "noiseRestart") {
    await runTool(card);
  } else if (action === "copy") {
    const output = card.querySelector(".output").value;
    if (!output) return showToast(uiText("noCopyResult"), true);
    await navigator.clipboard.writeText(output);
    showToast(uiText("copiedResult"));
  } else if (action === "clear") {
    stopNoiseMeter(card, false);
    card.querySelectorAll("textarea[data-field], input[data-field]").forEach(el => {
      if (el.type === "checkbox") return;
      if (el.type === "file") el.value = "";
      else el.value = "";
      if (el.tagName === "TEXTAREA") autoResizeTextarea(el, INPUT_TEXTAREA_MAX_HEIGHT);
    });
    const resultSearch = card.querySelector(".result-search");
    if (resultSearch) resultSearch.value = "";
    setOutput(card, "");
    setPreview(card, "");
  }
}

function onMainInput(e) {
  if (e.target.matches(".result-search")) {
    updateResultHighlight(e.target.closest(".tool-card"));
    return;
  }
  if (e.target.matches("textarea[data-field]")) {
    autoResizeTextarea(e.target, INPUT_TEXTAREA_MAX_HEIGHT);
  }
}

function onMainChange(e) {
  if (e.target.matches('select[data-field="format"]')) {
    const card = e.target.closest(".tool-card");
    if (card && card.dataset.tool === "barcode") applyBarcodeFormatSample(card);
  }
}

function showSingleTool(id, options = {}) {
  if (!id) return;
  const search = document.getElementById("toolSearch");
  if (search) search.value = "";
  soloToolId = id;
  const tool = tools.find(t => t.id === id);
  if (!options.keepCategory) {
    activeCategory = ALL_CATEGORY;
  } else if (activeCategory !== ALL_CATEGORY && tool && tool.category !== activeCategory) {
    activeCategory = tool.category;
  }
  document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.target === activeCategory));
  filterTools();
  const target = document.querySelector(`.tool-card[data-tool="${id}"]`);
  if (target) target.scrollIntoView({ block: "start", behavior: "smooth" });
}

async function runTool(card) {
  const id = card.dataset.tool;
  try {
    setOutput(card, uiText("processing"));
    setPreview(card, "");
    await handlers[id](card, readFields(card));
    recordRecentTool(id);
  } catch (err) {
    setOutput(card, err && err.message ? err.message : String(err));
    showToast(uiText("genericError"), true);
  }
}

function readFields(card) {
  const values = {};
  card.querySelectorAll("[data-field]").forEach(el => {
    const name = el.dataset.field;
    if (el.type === "checkbox") values[name] = el.checked;
    else if (el.type === "file") values[name] = el.files && el.files[0] ? el.files[0] : null;
    else values[name] = el.value;
  });
  return values;
}

function setOutput(card, value) {
  const output = card.querySelector(".output");
  output.value = typeof value === "string" ? value : JSON.stringify(value, null, 2);
  autoResizeTextarea(output);
  updateResultHighlight(card);
}

function updateResultHighlight(card) {
  if (!card) return;
  const search = card.querySelector(".result-search");
  const output = card.querySelector(".output");
  const highlight = card.querySelector(".result-highlight");
  const count = card.querySelector(".result-match-count");
  if (!search || !output || !highlight || !count) return;
  const query = search.value.trim();
  if (!query || !output.value) {
    highlight.innerHTML = "";
    highlight.classList.remove("on");
    count.textContent = query ? formatResultMatchCount(0) : "";
    return;
  }
  const result = highlightLiteral(output.value, query);
  highlight.innerHTML = result.html;
  highlight.classList.add("on");
  count.textContent = formatResultMatchCount(result.count);
}

function highlightLiteral(text, query) {
  const re = new RegExp(escapeRegExp(query), "gi");
  let out = "", last = 0, count = 0, m;
  while ((m = re.exec(text))) {
    out += escapeHtml(text.slice(last, m.index)) + `<mark class="match">${escapeHtml(m[0])}</mark>`;
    last = m.index + m[0].length;
    count++;
    if (m[0] === "") re.lastIndex++;
  }
  out += escapeHtml(text.slice(last));
  return { html: out, count };
}

function escapeRegExp(value) {
  return String(value).replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
}

function formatResultMatchCount(count) {
  if (currentLang === "en") return `${count} ${count === 1 ? "match" : "matches"}`;
  return `${count}개 일치`;
}

function setPreview(card, html) {
  const preview = card.querySelector(".preview");
  preview.innerHTML = html || "";
  preview.classList.toggle("on", !!html);
}

async function startNoiseMeter(card, offset) {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    throw new Error(langText("이 브라우저는 마이크 입력을 지원하지 않습니다.", "This browser does not support microphone input."));
  }
  const AudioContextClass = window.AudioContext || window.webkitAudioContext;
  if (!AudioContextClass) {
    throw new Error(langText("이 브라우저는 Web Audio API를 지원하지 않습니다.", "This browser does not support the Web Audio API."));
  }

  stopNoiseMeter(card, false);
  const calibration = Number.isFinite(offset) ? offset : 100;
  const stream = await navigator.mediaDevices.getUserMedia({
    audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false },
    video: false
  });
  let audioContext;
  try {
    audioContext = new AudioContextClass();
    if (audioContext.state === "suspended") await audioContext.resume();
    const source = audioContext.createMediaStreamSource(stream);
    const analyser = audioContext.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.72;
    source.connect(analyser);

    const useFloat = typeof analyser.getFloatTimeDomainData === "function";
    const data = useFloat ? new Float32Array(analyser.fftSize) : new Uint8Array(analyser.fftSize);
    const state = { stream, audioContext, source, analyser, data, useFloat, calibration, raf: 0, last: null, nextOutputAt: 0, history: [], viewPoints: 240, capPoints: 36000, nextSampleAt: 0, startAt: 0, warmupMs: 1000 };
    noiseMeters.set(card, state);
    setOutput(card, langText("측정 중...\n마이크 권한을 허용하면 값이 갱신됩니다.", "Measuring...\nValues will update after microphone permission is allowed."));
    setPreview(card, noiseMeterHtml());

    const tick = () => {
      if (!noiseMeters.has(card)) return;
      updateNoiseMeter(card, state);
      state.raf = requestAnimationFrame(tick);
    };
    tick();
  } catch (err) {
    for (const track of stream.getTracks()) track.stop();
    if (audioContext) {
      try { audioContext.close(); } catch (_) {}
    }
    throw err;
  }
}

function updateNoiseMeter(card, state) {
  if (state.useFloat) state.analyser.getFloatTimeDomainData(state.data);
  else state.analyser.getByteTimeDomainData(state.data);

  let sum = 0, peak = 0;
  for (let i = 0; i < state.data.length; i++) {
    const sample = state.useFloat ? state.data[i] : (state.data[i] - 128) / 128;
    sum += sample * sample;
    peak = Math.max(peak, Math.abs(sample));
  }
  const rms = Math.sqrt(sum / state.data.length);
  const dbfs = 20 * Math.log10(Math.max(rms, 0.00000001));
  const db = Math.max(0, Math.min(140, dbfs + state.calibration));
  state.last = { db, dbfs, peak, at: new Date() };

  const level = card.querySelector("[data-noise-level]");
  const sub = card.querySelector("[data-noise-sub]");
  const bar = card.querySelector("[data-noise-bar]");
  if (level) level.textContent = `${formatNoiseNumber(db)} dB`;
  if (sub) sub.textContent = `dBFS ${formatNoiseNumber(dbfs)} / peak ${peak.toFixed(3)}`;
  if (bar) {
    bar.style.width = `${Math.min(100, (db / 120) * 100)}%`;
    bar.style.background = noiseColor(db);
  }

  const now = Date.now();
  if (!state.startAt) state.startAt = now;
  const warmedUp = now - state.startAt >= state.warmupMs;
  if (warmedUp && now >= state.nextSampleAt) {
    state.history.push(db);
    if (state.history.length > state.capPoints) state.history.shift();
    state.nextSampleAt = now + 100;
    drawNoiseGraph(card, state, false);
  }
  if (now >= state.nextOutputAt) {
    setOutput(card, formatNoiseOutput(state, langText("측정 중", "Measuring")));
    state.nextOutputAt = now + 700;
  }
}

function drawNoiseGraph(card, state, isFinal) {
  const canvas = card.querySelector("[data-noise-graph]");
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const cssW = canvas.clientWidth || 320;
  const cssH = canvas.clientHeight || 100;
  const pxW = Math.round(cssW * dpr);
  const pxH = Math.round(cssH * dpr);
  if (canvas.width !== pxW || canvas.height !== pxH) {
    canvas.width = pxW;
    canvas.height = pxH;
  }
  const ctx = canvas.getContext("2d");
  if (!ctx) return;
  const w = canvas.width, h = canvas.height, maxDb = 120;
  ctx.clearRect(0, 0, w, h);

  ctx.lineWidth = Math.max(1, dpr);
  ctx.strokeStyle = "rgba(100,112,119,0.22)";
  ctx.fillStyle = "rgba(100,112,119,0.85)";
  ctx.font = `${Math.round(10 * dpr)}px Consolas, monospace`;
  ctx.textBaseline = "bottom";
  for (const g of [30, 60, 90, 120]) {
    const y = h - (g / maxDb) * h;
    ctx.beginPath();
    ctx.moveTo(0, y + 0.5);
    ctx.lineTo(w, y + 0.5);
    ctx.stroke();
    ctx.fillText(String(g), 3 * dpr, y - 2 * dpr);
  }

  const all = state.history;
  const hist = isFinal ? all : all.slice(-state.viewPoints);
  if (hist.length < 2) return;
  const len = hist.length;
  const denom = isFinal ? Math.max(len - 1, 1) : (state.viewPoints - 1);
  const stepX = w / denom;
  const xAt = (i) => isFinal ? i * stepX : w - (len - 1 - i) * stepX;
  const yAt = (db) => h - (Math.min(Math.max(db, 0), maxDb) / maxDb) * h;

  // filled area under the line
  ctx.beginPath();
  ctx.moveTo(xAt(0), h);
  for (let i = 0; i < len; i++) ctx.lineTo(xAt(i), yAt(hist[i]));
  ctx.lineTo(xAt(len - 1), h);
  ctx.closePath();
  ctx.fillStyle = "rgba(15,118,110,0.12)";
  ctx.fill();

  // line
  ctx.beginPath();
  for (let i = 0; i < len; i++) {
    const x = xAt(i), y = yAt(hist[i]);
    if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
  }
  ctx.lineWidth = Math.max(1.5, 1.5 * dpr);
  ctx.lineJoin = "round";
  ctx.strokeStyle = noiseCanvasColor(hist[len - 1]);
  ctx.stroke();

  // latest point marker
  const lx = xAt(len - 1), ly = yAt(hist[len - 1]);
  ctx.beginPath();
  ctx.arc(lx, ly, Math.max(2, 2.5 * dpr), 0, Math.PI * 2);
  ctx.fillStyle = noiseCanvasColor(hist[len - 1]);
  ctx.fill();
}

function noiseCanvasColor(db) {
  if (db >= 90) return "#b91c1c";
  if (db >= 70) return "#a16207";
  return "#0f766e";
}

function stopNoiseMeter(card, showResult) {
  const state = card ? noiseMeters.get(card) : null;
  if (!state) return false;
  if (state.raf) cancelAnimationFrame(state.raf);
  try { state.source.disconnect(); } catch (_) {}
  for (const track of state.stream.getTracks()) track.stop();
  try { state.audioContext.close(); } catch (_) {}
  noiseMeters.delete(card);
  if (showResult) {
    setOutput(card, formatNoiseOutput(state, langText("정지", "Stopped")));
    drawNoiseGraph(card, state, true);
    const label = card.querySelector("[data-noise-graph-label]");
    if (label) label.textContent = langText("전체 구간", "Full range");
    const span = card.querySelector("[data-noise-graph-span]");
    if (span) span.textContent = `${(state.history.length * 0.1).toFixed(1)}s`;
    const btn = card.querySelector("button[data-action='noiseStop']");
    if (btn) {
      btn.dataset.action = "noiseRestart";
      btn.textContent = uiText("remeasure");
    }
  } else {
    setPreview(card, "");
  }
  return true;
}

function stopAllNoiseMeters(showResult) {
  for (const card of [...noiseMeters.keys()]) stopNoiseMeter(card, showResult);
}

function noiseMeterHtml() {
  return `<div class="noise-meter">
    <div class="noise-meter-head">
      <div>
        <div class="noise-meter-value" data-noise-level>--.- dB</div>
        <div class="noise-meter-sub" data-noise-sub>${escapeHtml(langText("마이크 입력 대기 중", "Waiting for microphone input"))}</div>
      </div>
      <button class="btn" type="button" data-action="noiseStop">${escapeHtml(uiText("stop"))}</button>
    </div>
    <div class="noise-meter-bar" aria-hidden="true"><span data-noise-bar></span></div>
    <div class="noise-meter-scale"><span>0</span><span>30</span><span>60</span><span>90</span><span>120 dB</span></div>
    <canvas class="noise-meter-graph" data-noise-graph aria-hidden="true"></canvas>
    <div class="noise-meter-graph-cap"><span data-noise-graph-label>${escapeHtml(langText("최근 시계열", "Recent timeline"))}</span><span data-noise-graph-span>~24s</span></div>
    <p class="noise-meter-note">${escapeHtml(langText("마이크와 브라우저 gain 기반 추정치입니다. 보정된 소음계가 아닙니다.", "Estimated from microphone and browser gain. This is not a calibrated sound level meter."))}</p>
  </div>`;
}

function formatNoiseOutput(state, status) {
  const last = state.last || {};
  const lines = [
    `${langText("상태", "Status")}: ${status}`,
    `${langText("추정 소음", "Estimated noise")}: ${formatNoiseNumber(last.db)} dB`,
    `dBFS: ${formatNoiseNumber(last.dbfs)}`,
    `Peak: ${Number.isFinite(last.peak) ? last.peak.toFixed(4) : "----"}`
  ];
  const stats = noiseStats(state.history);
  if (stats) {
    lines.push(`${langText("최고", "Max")}: ${formatNoiseNumber(stats.max)} dB / ${langText("최저", "Min")}: ${formatNoiseNumber(stats.min)} dB / ${langText("평균", "Avg")}: ${formatNoiseNumber(stats.avg)} dB`);
    lines.push(`${langText("측정 구간", "Duration")}: ${(stats.count * 0.1).toFixed(1)}s (${stats.count} ${langText("샘플", "samples")})`);
  }
  lines.push(`${langText("보정 오프셋", "Calibration offset")}: ${formatNoiseNumber(state.calibration)} dB`);
  lines.push(langText("참고: 기기별 마이크 감도와 자동 보정에 따라 실제 SPL과 다를 수 있습니다.", "Note: actual SPL may differ depending on microphone sensitivity and device processing."));
  return lines.join("\n");
}

function noiseStats(history) {
  if (!history || !history.length) return null;
  let min = Infinity, max = -Infinity, sum = 0;
  for (const v of history) {
    if (v > 0 && v < min) min = v;
    if (v > max) max = v;
    sum += v;
  }
  if (!Number.isFinite(min)) min = max;
  return { min, max, avg: sum / history.length, count: history.length };
}

function formatNoiseNumber(value) {
  return Number.isFinite(value) ? value.toFixed(1) : "--.-";
}

function noiseColor(db) {
  if (db >= 90) return "var(--red)";
  if (db >= 70) return "var(--amber)";
  return "var(--accent)";
}

function applyBarcodeFormatSample(card) {
  const data = card.querySelector('[data-field="data"]');
  const format = card.querySelector('[data-field="format"]');
  if (!data || !format) return;
  const spec = BARCODE_FORMAT_SAMPLES[format.value];
  const knownSamples = [BARCODE_DEFAULT_DATA, ...Object.values(BARCODE_FORMAT_SAMPLES).map(item => item.sample)];
  const current = data.value.trim();
  if (spec) {
    data.placeholder = `${langText("샘플", "Sample")}: ${spec.sample}`;
    if (!current || knownSamples.includes(current)) data.value = spec.sample;
  } else {
    data.placeholder = BARCODE_DEFAULT_DATA;
    if (knownSamples.includes(current)) data.value = BARCODE_DEFAULT_DATA;
  }
}

function validateBarcodeData(format, data) {
  if (!data) {
    return {
      ok: false,
      message: `${langText("바코드 데이터를 입력하세요.", "Enter barcode data.")}\n\n${barcodeSampleText()}`
    };
  }
  const spec = BARCODE_FORMAT_SAMPLES[format];
  if (!spec || spec.pattern.test(data)) return { ok: true };
  return {
    ok: false,
    message: [
      `${barcodeFormatLabel(format)} ${langText("입력 형식 오류", "input format error")}`,
      `${langText("필요 조건", "Required")}: ${langText(spec.koRule, spec.enRule)}`,
      `${langText("샘플", "Sample")}: ${spec.sample}`,
      "",
      barcodeSampleText()
    ].join("\n")
  };
}

function barcodeSampleText() {
  return [
    `${langText("데이터 샘플", "Data samples")}:`,
    `- EAN13: ${BARCODE_FORMAT_SAMPLES.EAN13.sample} (${langText(BARCODE_FORMAT_SAMPLES.EAN13.koRule, BARCODE_FORMAT_SAMPLES.EAN13.enRule)})`,
    `- UPC-A: ${BARCODE_FORMAT_SAMPLES.UPCA.sample} (${langText(BARCODE_FORMAT_SAMPLES.UPCA.koRule, BARCODE_FORMAT_SAMPLES.UPCA.enRule)})`
  ].join("\n");
}

function barcodeSampleHtml() {
  return `<table class="mini-table">
    <thead><tr><th>${escapeHtml(langText("형식", "Format"))}</th><th>${escapeHtml(langText("샘플", "Sample"))}</th><th>${escapeHtml(langText("필요 조건", "Required"))}</th></tr></thead>
    <tbody>
      <tr><td>EAN13</td><td>${BARCODE_FORMAT_SAMPLES.EAN13.sample}</td><td>${escapeHtml(langText(BARCODE_FORMAT_SAMPLES.EAN13.koRule, BARCODE_FORMAT_SAMPLES.EAN13.enRule))}</td></tr>
      <tr><td>UPC-A</td><td>${BARCODE_FORMAT_SAMPLES.UPCA.sample}</td><td>${escapeHtml(langText(BARCODE_FORMAT_SAMPLES.UPCA.koRule, BARCODE_FORMAT_SAMPLES.UPCA.enRule))}</td></tr>
    </tbody>
  </table>`;
}

function barcodeFormatLabel(format) {
  return format === "UPCA" ? "UPC-A" : format;
}

function queryJsonPath(root, path) {
  let p = String(path || "$").trim();
  if (!p || p === "$" || p === ".") return [root];
  if (p.startsWith(".")) p = "$" + p;
  if (!p.startsWith("$")) p = "$." + p;
  const tokens = [];
  const re = /\.([A-Za-z_$][\w$-]*)|\[['"]([^'"]+)['"]\]|\[(\d+|\*)\]|\.\*/g;
  let m;
  while ((m = re.exec(p))) {
    if (m[1]) tokens.push({ type: "key", value: m[1] });
    else if (m[2]) tokens.push({ type: "key", value: m[2] });
    else if (m[3]) tokens.push({ type: m[3] === "*" ? "wild" : "index", value: Number(m[3]) });
    else tokens.push({ type: "wild" });
  }
  let current = [root];
  for (const token of tokens) {
    const next = [];
    for (const item of current) {
      if (token.type === "key" && item != null && Object.prototype.hasOwnProperty.call(Object(item), token.value)) {
        next.push(item[token.value]);
      } else if (token.type === "index" && Array.isArray(item) && token.value < item.length) {
        next.push(item[token.value]);
      } else if (token.type === "wild" && item != null) {
        if (Array.isArray(item)) next.push(...item);
        else if (typeof item === "object") next.push(...Object.values(item));
      }
    }
    current = next;
  }
  return current;
}

function jsonPathPreviewHtml(result) {
  return `<table class="mini-table"><tbody><tr><th>${escapeHtml(langText("결과 수", "Result count"))}</th><td>${result.length}</td></tr></tbody></table>`;
}

function validateJsonSchema(value, schema, path = "$") {
  const errors = [];
  if (!schema || typeof schema !== "object") return errors;
  const types = Array.isArray(schema.type) ? schema.type : schema.type ? [schema.type] : [];
  if (types.length && !types.some(type => jsonSchemaTypeMatches(value, type))) {
    errors.push(`${path}: ${langText("타입 불일치", "type mismatch")} (${types.join("|")})`);
    return errors;
  }
  if (schema.enum && !schema.enum.some(v => JSON.stringify(v) === JSON.stringify(value))) errors.push(`${path}: enum`);
  if ("const" in schema && JSON.stringify(schema.const) !== JSON.stringify(value)) errors.push(`${path}: const`);
  if (typeof value === "number") {
    if (typeof schema.minimum === "number" && value < schema.minimum) errors.push(`${path}: minimum ${schema.minimum}`);
    if (typeof schema.maximum === "number" && value > schema.maximum) errors.push(`${path}: maximum ${schema.maximum}`);
  }
  if (typeof value === "string") {
    if (typeof schema.minLength === "number" && value.length < schema.minLength) errors.push(`${path}: minLength ${schema.minLength}`);
    if (typeof schema.maxLength === "number" && value.length > schema.maxLength) errors.push(`${path}: maxLength ${schema.maxLength}`);
    if (schema.pattern && !(new RegExp(schema.pattern).test(value))) errors.push(`${path}: pattern ${schema.pattern}`);
  }
  if (Array.isArray(value)) {
    if (typeof schema.minItems === "number" && value.length < schema.minItems) errors.push(`${path}: minItems ${schema.minItems}`);
    if (typeof schema.maxItems === "number" && value.length > schema.maxItems) errors.push(`${path}: maxItems ${schema.maxItems}`);
    if (schema.items) value.forEach((item, i) => errors.push(...validateJsonSchema(item, schema.items, `${path}[${i}]`)));
  }
  if (value && typeof value === "object" && !Array.isArray(value)) {
    for (const key of schema.required || []) {
      if (!Object.prototype.hasOwnProperty.call(value, key)) errors.push(`${path}.${key}: ${langText("필수 값 누락", "required value missing")}`);
    }
    if (schema.properties && typeof schema.properties === "object") {
      for (const [key, childSchema] of Object.entries(schema.properties)) {
        if (Object.prototype.hasOwnProperty.call(value, key)) errors.push(...validateJsonSchema(value[key], childSchema, `${path}.${key}`));
      }
    }
  }
  return errors;
}

function jsonSchemaTypeMatches(value, type) {
  if (type === "array") return Array.isArray(value);
  if (type === "null") return value === null;
  if (type === "integer") return Number.isInteger(value);
  if (type === "number") return typeof value === "number" && Number.isFinite(value);
  if (type === "object") return value !== null && typeof value === "object" && !Array.isArray(value);
  return typeof value === type;
}

function buildLineDiff(left, right, trim) {
  const a = String(left).split(/\r\n|\r|\n/);
  const b = String(right).split(/\r\n|\r|\n/);
  const ak = trim ? a.map(line => line.trim()) : a;
  const bk = trim ? b.map(line => line.trim()) : b;
  const dp = Array.from({ length: a.length + 1 }, () => Array(b.length + 1).fill(0));
  for (let i = a.length - 1; i >= 0; i--) {
    for (let j = b.length - 1; j >= 0; j--) {
      dp[i][j] = ak[i] === bk[j] ? dp[i + 1][j + 1] + 1 : Math.max(dp[i + 1][j], dp[i][j + 1]);
    }
  }
  const out = [];
  let i = 0, j = 0;
  while (i < a.length || j < b.length) {
    if (i < a.length && j < b.length && ak[i] === bk[j]) {
      out.push({ type: "same", text: a[i] });
      i++; j++;
    } else if (j < b.length && (i === a.length || dp[i][j + 1] >= dp[i + 1][j])) {
      out.push({ type: "add", text: b[j++] });
    } else {
      out.push({ type: "del", text: a[i++] });
    }
  }
  return out;
}

function diffPreviewHtml(diff) {
  return `<table class="mini-table diff-table"><tbody>${diff.map(row => `<tr class="diff-${row.type}"><td>${row.type === "add" ? "+" : row.type === "del" ? "-" : ""}</td><td><pre style="margin:0;white-space:pre-wrap">${escapeHtml(row.text)}</pre></td></tr>`).join("")}</tbody></table>`;
}

function parseUrlDetails(value) {
  const url = new URL(String(value).trim(), window.location.href);
  const params = {};
  for (const [key, val] of url.searchParams.entries()) {
    if (Object.prototype.hasOwnProperty.call(params, key)) {
      if (!Array.isArray(params[key])) params[key] = [params[key]];
      params[key].push(val);
    } else params[key] = val;
  }
  return {
    href: url.href,
    protocol: url.protocol.replace(/:$/, ""),
    username: url.username,
    password: url.password ? "(set)" : "",
    host: url.host,
    hostname: url.hostname,
    port: url.port,
    pathname: url.pathname,
    search: url.search,
    hash: url.hash,
    queryParams: params
  };
}

function urlDetailsHtml(parsed) {
  const rows = Object.entries(parsed).filter(([key]) => key !== "queryParams").map(([key, value]) => `<tr><th>${escapeHtml(key)}</th><td>${escapeHtml(value)}</td></tr>`).join("");
  const params = Object.entries(parsed.queryParams).map(([key, value]) => `<tr><td>${escapeHtml(key)}</td><td>${escapeHtml(Array.isArray(value) ? value.join(", ") : value)}</td></tr>`).join("");
  return `<table class="mini-table"><tbody>${rows}</tbody></table>${params ? `<table class="mini-table"><thead><tr><th>query</th><th>value</th></tr></thead><tbody>${params}</tbody></table>` : ""}`;
}

function parseHttpHeaders(raw) {
  const lines = String(raw).split(/\r\n|\r|\n/).map(line => line.trim()).filter(Boolean);
  const startLine = lines[0] && !lines[0].includes(":") ? lines.shift() : "";
  const headers = {};
  const list = [];
  for (const line of lines) {
    const idx = line.indexOf(":");
    if (idx < 0) continue;
    const name = line.slice(0, idx).trim();
    const key = name.toLowerCase();
    const value = line.slice(idx + 1).trim();
    list.push({ name, value });
    if (headers[key]) {
      if (!Array.isArray(headers[key])) headers[key] = [headers[key]];
      headers[key].push(value);
    } else headers[key] = value;
  }
  return {
    startLine,
    headers,
    cacheControl: parseHeaderDirectives(headers["cache-control"]),
    cookies: list.filter(h => h.name.toLowerCase() === "set-cookie" || h.name.toLowerCase() === "cookie").map(h => parseCookieHeader(h.value))
  };
}

function parseHeaderDirectives(value) {
  const out = {};
  const text = Array.isArray(value) ? value.join(",") : String(value || "");
  for (const part of text.split(",")) {
    if (!part.trim()) continue;
    const [k, ...rest] = part.trim().split("=");
    out[k.toLowerCase()] = rest.length ? rest.join("=").replace(/^"|"$/g, "") : true;
  }
  return out;
}

function parseCookieHeader(value) {
  const parts = String(value).split(";").map(part => part.trim()).filter(Boolean);
  const [nameValue, ...attrs] = parts;
  const idx = nameValue.indexOf("=");
  const cookie = { name: idx >= 0 ? nameValue.slice(0, idx) : nameValue, value: idx >= 0 ? nameValue.slice(idx + 1) : "" };
  cookie.attributes = Object.fromEntries(attrs.map(attr => {
    const i = attr.indexOf("=");
    return i >= 0 ? [attr.slice(0, i).toLowerCase(), attr.slice(i + 1)] : [attr.toLowerCase(), true];
  }));
  return cookie;
}

function httpHeadersHtml(parsed) {
  const rows = Object.entries(parsed.headers).map(([key, value]) => `<tr><th>${escapeHtml(key)}</th><td>${escapeHtml(Array.isArray(value) ? value.join("\n") : value)}</td></tr>`).join("");
  return `<table class="mini-table"><tbody>${parsed.startLine ? `<tr><th>start</th><td>${escapeHtml(parsed.startLine)}</td></tr>` : ""}${rows}</tbody></table>`;
}

function readFileAsDataURL(file) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onload = () => resolve(String(reader.result || ""));
    reader.onerror = () => reject(reader.error || new Error("File read failed."));
    reader.readAsDataURL(file);
  });
}

function imageDataUriPreview(dataUri) {
  return `<img src="${escapeHtml(dataUri)}" alt="Image preview" style="max-width:100%;height:auto">`;
}

function showToast(message, error) {
  const toast = document.getElementById("toast");
  toast.textContent = message;
  toast.classList.toggle("error", !!error);
  toast.classList.add("on");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove("on"), 2600);
}

function filterTools() {
  const q = document.getElementById("toolSearch").value.trim().toLowerCase();
  const hasSearch = q.length > 0;
  if (hasSearch) soloToolId = null;
  const solo = soloToolId;
  document.querySelectorAll(".tool-card").forEach(card => {
    const hide = solo ? card.dataset.tool !== solo : (hasSearch && !card.dataset.search.includes(q));
    card.classList.toggle("hidden", hide);
  });
  document.querySelectorAll(".category").forEach(section => {
    const total = section.querySelectorAll(".tool-card").length;
    const visible = section.querySelectorAll(".tool-card:not(.hidden)").length;
    const inActiveScope = activeCategory === ALL_CATEGORY || section.dataset.category === activeCategory;
    const shouldShow = (solo || hasSearch) ? visible > 0 : inActiveScope;
    section.classList.toggle("hidden", !shouldShow);
    const count = section.querySelector(".category-count");
    if (count) count.textContent = (solo || hasSearch) ? `${visible} / ${formatToolCount(total)}` : formatToolCount(total);
  });
  updateToolQuickPanel(q);
  requestAnimationFrame(autoResizeVisibleTextareas);
}

function setActiveCategory(categoryId, scrollToTop = true) {
  soloToolId = null;
  activeCategory = categoryId;
  document.querySelectorAll(".nav-btn").forEach(btn => btn.classList.toggle("active", btn.dataset.target === activeCategory));
  filterTools();
  if (scrollToTop) window.scrollTo({ top: 0, behavior: "smooth" });
}

function setupTopButton() {
  const button = document.getElementById("topButton");
  if (!button) return;
  button.addEventListener("click", () => window.scrollTo({ top: 0, behavior: "smooth" }));
  window.addEventListener("scroll", updateTopButton, { passive: true });
  updateTopButton();
}

function updateTopButton() {
  const button = document.getElementById("topButton");
  if (!button) return;
  button.classList.toggle("on", window.scrollY > 240);
}

function autoResizeTextarea(textarea, maxHeight) {
  textarea.style.height = "auto";
  const nextHeight = Math.ceil(textarea.scrollHeight) + 2;
  if (maxHeight && nextHeight > maxHeight) {
    textarea.style.height = `${maxHeight}px`;
    textarea.style.overflowY = "auto";
  } else {
    textarea.style.height = `${nextHeight}px`;
    textarea.style.overflowY = "hidden";
  }
}

function autoResizeVisibleTextareas() {
  document.querySelectorAll(".tool-card:not(.hidden) textarea").forEach(textarea => {
    if (textarea.offsetParent === null) return;
    autoResizeTextarea(textarea, textarea.classList.contains("output") ? 0 : INPUT_TEXTAREA_MAX_HEIGHT);
  });
}

function updateToolQuickPanel(query) {
  const q = String(query || "").trim().toLowerCase();
  const hasSearch = q.length > 0;
  const quickPanel = document.getElementById("toolQuickPanel");
  const quickButtons = document.getElementById("toolQuickButtons");
  const quickCount = document.getElementById("toolQuickCount");
  if (!quickPanel || !quickButtons || !quickCount) return;
  const scopedTools = hasSearch
    ? tools.filter(tool => toolMatchesSearch(tool, q))
    : activeCategory === ALL_CATEGORY
      ? tools
      : tools.filter(tool => tool.category === activeCategory);
  quickPanel.classList.toggle("hidden", scopedTools.length === 0);
  quickButtons.innerHTML = scopedTools.map(toolQuickButtonHtml).join("");
  quickCount.textContent = hasSearch ? formatSearchResultCount(scopedTools.length) : formatToolCount(scopedTools.length);
  applyQuickCollapsed();
}

function toolMatchesSearch(tool, query) {
  return toolSearchText(tool).includes(query);
}

const handlers = {
  base64(card, v) {
    const bytes = enc.encode(v.input);
    if (v.mode === "b64enc") return setOutput(card, bytesToBase64(bytes));
    if (v.mode === "b64uenc") return setOutput(card, toBase64Url(bytesToBase64(bytes)));
    const input = v.mode === "b64udec" ? fromBase64Url(v.input) : v.input;
    setOutput(card, dec.decode(base64ToBytes(input)));
  },
  url(card, v) {
    if (v.mode === "enc") {
      let out = encodeURIComponent(v.input);
      if (v.space === "plus") out = out.replace(/%20/g, "+");
      setOutput(card, out);
    } else {
      const text = v.space === "plus" ? v.input.replace(/\+/g, "%20") : v.input;
      setOutput(card, decodeURIComponent(text));
    }
  },
  htmlEntity(card, v) {
    if (v.mode === "enc") return setOutput(card, escapeHtml(v.input));
    const textarea = document.createElement("textarea");
    textarea.innerHTML = v.input;
    setOutput(card, textarea.value);
  },
  unicode(card, v) {
    if (v.mode === "enc") {
      setOutput(card, [...v.input].map(ch => {
        const cp = ch.codePointAt(0);
        return cp <= 0xffff ? "\\u" + cp.toString(16).padStart(4, "0") : "\\u{" + cp.toString(16) + "}";
      }).join(""));
    } else {
      setOutput(card, v.input.replace(/\\u\{([0-9a-fA-F]+)\}|\\u([0-9a-fA-F]{4})/g, (_, braced, short) => String.fromCodePoint(parseInt(braced || short, 16))));
    }
  },
  hex(card, v) {
    if (v.mode === "enc") {
      const out = [...enc.encode(v.input)].map(b => b.toString(16).padStart(2, "0"));
      setOutput(card, v.compact ? out.join("") : out.join(" "));
    } else {
      const clean = v.input.replace(/[^0-9a-fA-F]/g, "");
      if (clean.length % 2) throw new Error(langText("Hex 길이가 짝수여야 합니다.", "Hex length must be even."));
      if (!clean) return setOutput(card, "");
      const bytes = new Uint8Array(clean.match(/.{2}/g).map(h => parseInt(h, 16)));
      setOutput(card, dec.decode(bytes));
    }
  },
  binary(card, v) {
    if (v.mode === "enc") {
      setOutput(card, [...enc.encode(v.input)].map(b => b.toString(2).padStart(8, "0")).join(" "));
    } else {
      const parts = v.input.trim().split(/\s+/).filter(Boolean);
      if (parts.some(part => !/^[01]{1,8}$/.test(part))) throw new Error(langText("2진수 바이트는 1~8자리 0/1로 입력하세요.", "Binary bytes must be 1 to 8 digits of 0 or 1."));
      const bytes = new Uint8Array(parts.map(b => parseInt(b, 2)));
      setOutput(card, dec.decode(bytes));
    }
  },
  punycode(card, v) {
    setOutput(card, v.mode === "enc" ? domainToAscii(v.domain) : domainToUnicode(v.domain));
  },

  timestamp(card, v) {
    if (v.mode === "toDate") {
      const rawText = v.value.trim();
      const raw = Number(rawText);
      if (!Number.isFinite(raw)) throw new Error(langText("Timestamp 숫자를 입력하세요.", "Enter a numeric timestamp."));
      const unit = detectTimestampUnit(rawText, raw, v.unit);
      const ms = unit === "s" ? raw * 1000 : raw;
      setOutput(card, [
        `${v.unit === "auto" ? langText("감지 단위", "Detected unit") : langText("선택 단위", "Selected unit")}: ${unit === "ms" ? langText("밀리초", "milliseconds") : langText("초", "seconds")}`,
        `Local: ${formatDate(new Date(ms))}`,
        `UTC: ${formatDateOffset(ms, 0)}`,
        `KST: ${formatDateOffset(ms, 540)}`,
        `ISO: ${new Date(ms).toISOString()}`
      ].join("\n"));
    } else {
      const d = parseDateLoose(v.dateText);
      const ms = d.getTime();
      setOutput(card, `seconds: ${Math.floor(ms / 1000)}\nmilliseconds: ${ms}\nISO: ${d.toISOString()}`);
    }
  },
  timezone(card, v) {
    const from = Number(v.from);
    const to = Number(v.to);
    const parts = parseDateParts(v.dateText);
    const utcMs = Date.UTC(parts.y, parts.m - 1, parts.d, parts.hh, parts.mm, parts.ss) - from * 60000;
    setOutput(card, `UTC: ${formatDateOffset(utcMs, 0)}\n${langText("변환 결과", "Converted")}: ${formatDateOffset(utcMs, to)}`);
  },
  dateFormat(card, v) {
    const d = parseDateLoose(v.dateText);
    setOutput(card, formatByPattern(d, v.format));
  },
  dateDiff(card, v) {
    const start = parseDateLoose(v.start);
    const end = parseDateLoose(v.end);
    const diffMs = end.getTime() - start.getTime();
    const days = diffMs / 86400000;
    const add = Number(v.addDays || 0);
    const added = new Date(start.getTime() + add * 86400000);
    setOutput(card, [
      `${langText("차이", "Difference")}: ${days.toLocaleString()} ${langText("일", "days")}`,
      `${langText("시간", "Hours")}: ${(diffMs / 3600000).toLocaleString()}`,
      `${langText("분", "Minutes")}: ${(diffMs / 60000).toLocaleString()}`,
      `D-day: ${days >= 0 ? "D-" + Math.ceil(days) : "D+" + Math.abs(Math.floor(days))}`,
      `${langText("시작일", "Start date")} + ${add} ${langText("일", "days")}: ${formatDate(added).slice(0, 10)}`
    ].join("\n"));
  },
  cron(card, v) {
    const parsed = parseCron(v.expr);
    const offset = Number(v.tz || 0);
    const runs = nextCronRunsOffset(parsed, Number(v.count), offset);
    setOutput(card, `${describeCron(v.expr)}\n\n${langText("다음 실행", "Next runs")}:\n${runs.map(d => "- " + formatDateOffset(d.getTime(), offset)).join("\n")}`);
  },

  async hashText(card, v) {
    setOutput(card, bytesToHex(await digestBytes(v.alg, enc.encode(v.input))));
  },
  async hmac(card, v) {
    setOutput(card, bytesToHex(await hmacBytes(v.alg, enc.encode(v.key), enc.encode(v.input))));
  },
  async fileHash(card, v) {
    if (!v.file) throw new Error(langText("파일을 선택하세요.", "Select a file."));
    const bytes = new Uint8Array(await v.file.arrayBuffer());
    const hash = bytesToHex(await digestBytes(v.alg, bytes));
    setOutput(card, `${v.file.name}\nsize: ${v.file.size.toLocaleString()} bytes\n${v.alg}: ${hash}`);
  },
  async bcrypt(card, v) {
    const bcrypt = await loadBcrypt();
    const rounds = Math.max(4, Math.min(14, Number(v.rounds) || 10));
    const hash = bcrypt.hashSync ? bcrypt.hashSync(v.password, rounds) : await bcrypt.hash(v.password, rounds);
    setOutput(card, hash);
  },
  uuid(card, v) {
    const count = Number(v.count);
    const out = [];
    for (let i = 0; i < count; i++) {
      if (v.version === "v1") out.push(uuidV1());
      else if (v.version === "v7") out.push(uuidV7());
      else out.push(crypto.randomUUID());
    }
    setOutput(card, out.join("\n"));
  },
  random(card, v) {
    const len = Math.max(1, Math.min(4096, Number(v.length) || 32));
    if (v.kind === "hex") return setOutput(card, bytesToHex(randomBytes(Math.ceil(len / 2))).slice(0, len));
    if (v.kind === "base64url") return setOutput(card, toBase64Url(bytesToBase64(randomBytes(Math.ceil(len * 0.75 + 2)))).slice(0, len));
    let chars = "";
    if (v.upper) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    if (v.lower) chars += "abcdefghijklmnopqrstuvwxyz";
    if (v.number) chars += "0123456789";
    if (v.symbol) chars += "!@#$%^&*()-_=+[]{};:,.?/|~";
    if (!chars) throw new Error(langText("문자 종류를 하나 이상 선택하세요.", "Select at least one character type."));
    const bytes = randomBytes(len);
    setOutput(card, [...bytes].map(b => chars[b % chars.length]).join(""));
  },

  case(card, v) {
    const words = wordsOf(v.input);
    const map = {
      camel: words.map((w, i) => i ? cap(w) : w.toLowerCase()).join(""),
      snake: words.map(w => w.toLowerCase()).join("_"),
      pascal: words.map(cap).join(""),
      kebab: words.map(w => w.toLowerCase()).join("-"),
      upper: v.input.toUpperCase(),
      lower: v.input.toLowerCase(),
      title: words.map(cap).join(" ")
    };
    setOutput(card, map[v.target]);
  },
  json(card, v) {
    const obj = JSON.parse(v.input);
    if (v.mode === "format") setOutput(card, JSON.stringify(obj, null, 2));
    else if (v.mode === "minify") setOutput(card, JSON.stringify(obj));
    else setOutput(card, langText("유효한 JSON입니다.", "Valid JSON."));
  },
  jsonPath(card, v) {
    const obj = JSON.parse(v.input);
    const result = queryJsonPath(obj, v.path);
    setOutput(card, JSON.stringify(result.length === 1 ? result[0] : result, null, 2));
    setPreview(card, jsonPathPreviewHtml(result));
  },
  jsonSchema(card, v) {
    const obj = JSON.parse(v.input);
    const schema = JSON.parse(v.schema);
    const errors = validateJsonSchema(obj, schema);
    setOutput(card, errors.length ? errors.join("\n") : langText("스키마 검사를 통과했습니다.", "Schema validation passed."));
    setPreview(card, `<table class="mini-table"><tbody><tr><th>${escapeHtml(langText("결과", "Result"))}</th><td>${escapeHtml(errors.length ? langText("실패", "Failed") : langText("통과", "Passed"))}</td></tr><tr><th>${escapeHtml(langText("오류", "Errors"))}</th><td>${escapeHtml(String(errors.length))}</td></tr></tbody></table>`);
  },
  xmlJson(card, v) {
    if (v.mode === "xmlToJson") {
      const doc = new DOMParser().parseFromString(v.input, "application/xml");
      const err = doc.querySelector("parsererror");
      if (err) throw new Error(langText("XML 파싱 오류", "XML parse error."));
      setOutput(card, JSON.stringify(xmlNodeToJson(doc.documentElement), null, 2));
    } else {
      setOutput(card, jsonToXml(JSON.parse(v.input), v.root || "root"));
    }
  },
  yamlJson(card, v) {
    if (v.mode === "yamlToJson") setOutput(card, JSON.stringify(parseSimpleYaml(v.input), null, 2));
    else setOutput(card, jsonToYaml(JSON.parse(v.input)));
  },
  csvJson(card, v) {
    if (v.mode === "csvToJson") setOutput(card, JSON.stringify(csvToJson(v.input), null, 2));
    else setOutput(card, jsonToCsv(JSON.parse(v.input)));
  },
  markdownHtml(card, v) {
    if (v.mode === "mdToHtml") {
      const html = markdownToHtml(v.input);
      setOutput(card, html);
      setPreview(card, html);
    } else {
      const div = document.createElement("div");
      div.innerHTML = v.input;
      setOutput(card, div.textContent || "");
    }
  },
  newline(card, v) {
    const normalized = v.input.replace(/\r\n|\r|\n/g, "\n");
    const sep = v.target === "crlf" ? "\r\n" : v.target === "cr" ? "\r" : "\n";
    setOutput(card, normalized.split("\n").join(sep));
  },
  counts(card, v) {
    const bytes = enc.encode(v.input).length;
    const lines = v.input.length ? v.input.split(/\r\n|\r|\n/).length : 0;
    const words = (v.input.match(/\S+/g) || []).length;
    setOutput(card, `${langText("문자 수", "Characters")}: ${[...v.input].length}\nUTF-16 length: ${v.input.length}\nUTF-8 bytes: ${bytes}\n${langText("줄 수", "Lines")}: ${lines}\n${langText("단어 수", "Words")}: ${words}`);
  },
  dedupeLines(card, v) {
    const seen = new Set();
    const out = [];
    for (const line of v.input.split(/\r\n|\r|\n/)) {
      const key = v.trim ? line.trim() : line;
      if (!seen.has(key)) {
        seen.add(key);
        out.push(line);
      }
    }
    setOutput(card, out.join("\n"));
  },
  sortLines(card, v) {
    const lines = v.input.split(/\r\n|\r|\n/);
    lines.sort((a, b) => v.numeric ? Number(a) - Number(b) : a.localeCompare(b, "ko"));
    if (v.order === "desc") lines.reverse();
    setOutput(card, lines.join("\n"));
  },
  diffText(card, v) {
    const diff = buildLineDiff(v.left, v.right, v.trim);
    setOutput(card, diff.map(row => `${row.type === "add" ? "+" : row.type === "del" ? "-" : " "} ${row.text}`).join("\n"));
    setPreview(card, diffPreviewHtml(diff));
  },

  radix(card, v) {
    const n = parseBigIntBase(v.value.trim(), Number(v.from));
    setOutput(card, `${localText("2진수")}: ${n.toString(2)}\n${localText("8진수")}: ${n.toString(8)}\n${localText("10진수")}: ${n.toString(10)}\n${localText("16진수")}: ${n.toString(16).toUpperCase()}`);
  },
  numberFormat(card, v) {
    if (v.mode === "parse") return setOutput(card, v.value.replace(/,/g, ""));
    const n = Number(v.value.replace(/,/g, ""));
    if (!Number.isFinite(n)) throw new Error(langText("숫자를 입력하세요.", "Enter a number."));
    setOutput(card, n.toLocaleString());
  },
  fileSize(card, v) {
    const units = ["B","KB","MB","GB","TB"];
    const base = Number(v.base);
    const bytes = Number(v.value) * Math.pow(base, units.indexOf(v.from));
    const out = bytes / Math.pow(base, units.indexOf(v.to));
    setOutput(card, `${formatNumber(out)} ${v.to}\n${formatNumber(bytes)} bytes`);
  },
  lengthUnit(card, v) {
    const toMeters = { m: 1, km: 1000, mile: 1609.344, inch: 0.0254, ft: 0.3048, cm: 0.01 };
    const meters = Number(v.value) * toMeters[v.from];
    setOutput(card, `${formatNumber(meters / toMeters[v.to])} ${v.to}\n${formatNumber(meters)} m`);
  },
  temperature(card, v) {
